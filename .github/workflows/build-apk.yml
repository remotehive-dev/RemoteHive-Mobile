name: Build APK

on:
  push:
    branches: [main]

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build APK on EAS
        id: build
        run: |
          OUTPUT=$(npx eas build --platform android --profile preview --non-interactive --no-wait 2>&1)
          BUILD_ID=$(echo "$OUTPUT" | grep -oP 'builds/[a-f0-9-]+' | head -1 | sed 's|builds/||')
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "Build ID: $BUILD_ID"

      - name: Wait for build, get artifact URL, and download APK
        id: download
        run: |
          BUILD_ID="${{ steps.build.outputs.build_id }}"
          echo "Waiting for build $BUILD_ID..."
          npx eas build:wait "$BUILD_ID" 2>&1
          ARTIFACT_URL=$(npx eas build:list --platform android --limit 1 --json 2>/dev/null | jq -r '.[0].artifacts.applicationArchiveUrl // empty')
          echo "artifact_url=$ARTIFACT_URL" >> $GITHUB_OUTPUT
          echo "Artifact URL: $ARTIFACT_URL"
          npx eas build:download "$BUILD_ID" --out RemoteHive.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build #${{ github.run_number }}
          files: RemoteHive.apk
          generate_release_notes: true

      - name: Update README QR with new APK URL
        run: |
          ARTIFACT_URL="${{ steps.download.outputs.artifact_url }}"
          if [ -z "$ARTIFACT_URL" ]; then
            echo "Could not get artifact URL, skipping QR update"
            exit 0
          fi
          # Generate QR code
          curl -s "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=$ARTIFACT_URL" -o assets/qr-download.png
          # Update README download link
          sed -i "s|https://expo.dev/artifacts/eas/[^ ]*|$ARTIFACT_URL|g" README.md
          # Commit and push with skip-ci
          git config user.name "remotehive-bot"
          git config user.email "bot@remotehive.in"
          git add assets/qr-download.png README.md
          git diff --cached --quiet || git commit -m "chore: update APK download QR [skip ci]"
          git push

      - name: Publish JS update to old APKs via EAS Update
        run: |
          npx eas update --branch preview --environment preview --message "Build #${{ github.run_number }}: ${{ github.event.head_commit.message }}"

      - name: Update version info in public releases repo
        run: |
          ARTIFACT_URL="${{ steps.download.outputs.artifact_url }}"
          if [ -z "$ARTIFACT_URL" ]; then exit 0; fi
          VERSION_CODE=$(( ${{ github.run_number }} + 1 ))
          git clone https://x-access-token:${{ secrets.RELEASES_TOKEN }}@github.com/remotehive-dev/remotehive-releases.git /tmp/releases
          cat > /tmp/releases/version.json <<EOF
          {
            "version": "1.0.${{ github.run_number }}",
            "versionCode": $VERSION_CODE,
            "apkUrl": "$ARTIFACT_URL",
            "releaseNotes": "Build #${{ github.run_number }}"
          }
          EOF
          cd /tmp/releases
          git config user.name "remotehive-bot"
          git config user.email "bot@remotehive.in"
          git add version.json
          git diff --cached --quiet || git commit -m "chore: update to build #${{ github.run_number }}"
          git push
