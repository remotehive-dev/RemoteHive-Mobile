name: Build APK

on:
  push:
    branches: [main]

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build APK on EAS
        id: build
        run: |
          OUTPUT=$(npx eas build --platform android --profile preview --non-interactive 2>&1)
          echo "$OUTPUT"
          # Extract artifact URL from output
          URL=$(echo "$OUTPUT" | grep -oP 'https://expo\.dev/artifacts/eas/[^"'"'"' \n]+')
          if [ -n "$URL" ]; then
            echo "artifact_url=$URL" >> $GITHUB_OUTPUT
          fi

      - name: Download APK and get URL if not captured
        if: steps.build.outputs.artifact_url == ''
        run: |
          BUILD_ID=$(npx eas build:list --platform android --limit 1 --json 2>/dev/null | jq -r '.[0].id')
          ARTIFACT_URL=$(npx eas build:list --platform android --limit 1 --json 2>/dev/null | jq -r '.[0].artifacts.applicationArchiveUrl // "https://expo.dev/artifacts/eas/\(.[0].id)"')
          echo "artifact_url=$ARTIFACT_URL" >> $GITHUB_OUTPUT
          npx eas build:download "$BUILD_ID" --output RemoteHive.apk

      - name: Download APK
        run: |
          BUILD_ID=$(npx eas build:list --platform android --limit 1 --json 2>/dev/null | jq -r '.[0].id')
          npx eas build:download "$BUILD_ID" --output RemoteHive.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build #${{ github.run_number }}
          files: RemoteHive.apk
          generate_release_notes: true

      - name: Update README QR with new APK URL
        run: |
          ARTIFACT_URL="${{ steps.build.outputs.artifact_url }}"
          if [ -z "$ARTIFACT_URL" ]; then
            # Parse from build:list output
            ARTIFACT_URL=$(npx eas build:list --platform android --limit 1 --json 2>/dev/null | jq -r '.[0].artifacts.applicationArchiveUrl // empty')
          fi
          if [ -z "$ARTIFACT_URL" ]; then
            echo "Could not get artifact URL, skipping QR update"
            exit 0
          fi
          echo "Artifact URL: $ARTIFACT_URL"
          # Generate QR code
          curl -s "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=$ARTIFACT_URL" -o assets/qr-download.png
          # Update README download link
          sed -i "s|https://expo.dev/artifacts/eas/[^ ]*|$ARTIFACT_URL|g" README.md
          # Commit and push with skip-ci
          git config user.name "remotehive-bot"
          git config user.email "bot@remotehive.in"
          git add assets/qr-download.png README.md
          git diff --cached --quiet || git commit -m "chore: update APK download QR [skip ci]"
          git push
