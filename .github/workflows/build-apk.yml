name: Build APK

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
  R2_ENDPOINT: ${{ secrets.CLOUDFLARE_R2_ENDPOINT }}
  R2_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY }}
  R2_SECRET_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_KEY }}
  R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build APK locally (no EAS cloud credits)
        run: |
          npx eas build --platform android --profile preview --local \
            --non-interactive \
            --output RemoteHive.apk

      - name: Create GitHub Release (private repo)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build #${{ github.run_number }}
          files: RemoteHive.apk
          generate_release_notes: true

      - name: Upload APK to Cloudflare R2
        run: |
          curl -s -X PUT "$R2_ENDPOINT/$R2_BUCKET/RemoteHive.apk" \
            --aws-sigv4 "aws:amz:auto:s3" \
            --user "$R2_ACCESS_KEY:$R2_SECRET_KEY" \
            -T RemoteHive.apk \
            -w "APK upload: HTTP %{http_code}\n"

      - name: Update version.json in R2
        run: |
          VERSION_CODE=$(( ${{ github.run_number }} + 1 ))
          cat > /tmp/version.json <<EOF
          {
            "version": "1.0.${{ github.run_number }}",
            "versionCode": $VERSION_CODE,
            "apkUrl": "https://dl.remotehive.in/latest.apk",
            "releaseNotes": "Build #${{ github.run_number }}"
          }
          EOF
          curl -s -X PUT "$R2_ENDPOINT/$R2_BUCKET/version.json" \
            --aws-sigv4 "aws:amz:auto:s3" \
            --user "$R2_ACCESS_KEY:$R2_SECRET_KEY" \
            -T /tmp/version.json \
            -w "version.json upload: HTTP %{http_code}\n"

      - name: Update build number in README
        run: |
          sed -i "s|build #[0-9]*|build #${{ github.run_number }}|g" README.md
          git config user.name "remotehive-bot"
          git config user.email "bot@remotehive.in"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update build number [skip ci]"
          git push

      - name: Publish JS update to old APKs via EAS Update
        run: |
          npx eas update --branch preview --environment preview --message "Build #${{ github.run_number }}: ${{ github.event.head_commit.message }}"
