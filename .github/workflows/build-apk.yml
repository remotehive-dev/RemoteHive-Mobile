name: Build APK

on:
  push:
    branches: [main]

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build APK on EAS
        run: npx eas build --platform android --profile preview --non-interactive

      - name: Download APK
        run: |
          BUILD_ID=$(npx eas build:list --platform android --limit 1 --json 2>/dev/null | npx -y jq -r '.[0].id')
          npx eas build:download "$BUILD_ID" --output RemoteHive.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build #${{ github.run_number }}
          files: RemoteHive.apk
          generate_release_notes: true
