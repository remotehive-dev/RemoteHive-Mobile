name: Build APK

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  R2_ENDPOINT: ${{ secrets.CLOUDFLARE_R2_ENDPOINT }}
  R2_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY }}
  R2_SECRET_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_KEY }}
  R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true

      - name: Cache Android prebuild
        uses: actions/cache@v4
        with:
          path: android/
          key: android-${{ hashFiles('package-lock.json', 'app.json') }}
          restore-keys: |
            android-

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0" 2>&1

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate keystore for signing
        run: |
          keytool -genkey -v \
            -keystore remotehive-keystore.jks \
            -alias remotehive \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass remotehive123 \
            -keypass remotehive123 \
            -dname "CN=RemoteHive, OU=Engineering, O=RemoteHive, L=San Francisco, ST=CA, C=US"

      - name: Prebuild native Android project
        run: npx expo prebuild --platform android

      - name: Inject signing config into build.gradle
        run: |
          cp remotehive-keystore.jks android/app/
          node -e "
const fs = require('fs');
let b = fs.readFileSync('android/app/build.gradle', 'utf8');
// Only inject if not already present (idempotent for cache restores)
if (!b.includes('remotehive-keystore.jks')) {
  b = b.replace(/(android\s*\{)/,
    '\$1\n    signingConfigs {\n        release {\n            storeFile file(\"remotehive-keystore.jks\")\n            storePassword \"remotehive123\"\n            keyAlias \"remotehive\"\n            keyPassword \"remotehive123\"\n        }\n    }');
  b = b.replace(/(release\s*\{)/,
    '\$1\n                signingConfig signingConfigs.release');
  fs.writeFileSync('android/app/build.gradle', b);
}
"

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --max-workers 2

      - name: Rename and prepare APK
        run: cp android/app/build/outputs/apk/release/app-release.apk RemoteHive.apk

      - name: Upload APK to Cloudflare R2
        run: |
          curl -s -X PUT "$R2_ENDPOINT/$R2_BUCKET/RemoteHive.apk" \
            --aws-sigv4 "aws:amz:auto:s3" \
            --user "$R2_ACCESS_KEY:$R2_SECRET_KEY" \
            -T RemoteHive.apk \
            -w "APK upload: HTTP %{http_code}\n"

      - name: Update version.json in R2
        run: |
          VERSION_CODE=$(( ${{ github.run_number }} + 1 ))
          cat > /tmp/version.json <<EOF
          {
            "version": "1.0.${{ github.run_number }}",
            "versionCode": $VERSION_CODE,
            "apkUrl": "https://dl.remotehive.in/latest.apk",
            "releaseNotes": "Build #${{ github.run_number }}"
          }
          EOF
          curl -s -X PUT "$R2_ENDPOINT/$R2_BUCKET/version.json" \
            --aws-sigv4 "aws:amz:auto:s3" \
            --user "$R2_ACCESS_KEY:$R2_SECRET_KEY" \
            -T /tmp/version.json \
            -w "version.json upload: HTTP %{http_code}\n"

      - name: Update build number in README
        run: |
          sed -i "s|build #[0-9]*|build #${{ github.run_number }}|g" README.md
          git config user.name "remotehive-bot"
          git config user.email "bot@remotehive.in"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update build number [skip ci]"
          git push
