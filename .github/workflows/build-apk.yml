name: Build APK

on:
  push:
    branches: [main]

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate keystore for signing
        run: |
          keytool -genkey -v \
            -keystore remotehive-keystore.jks \
            -alias remotehive \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass remotehive123 \
            -keypass remotehive123 \
            -dname "CN=RemoteHive, OU=Engineering, O=RemoteHive, L=San Francisco, ST=CA, C=US"

      - name: Build APK locally (no EAS cloud credits)
        run: |
          npx eas build --platform android --profile preview --local \
            --non-interactive \
            --output RemoteHive.apk

      - name: Create GitHub Release (private repo)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build #${{ github.run_number }}
          files: RemoteHive.apk
          generate_release_notes: true

      - name: Update README QR and push APK to public releases repo
        run: |
          PERMANENT_URL="https://raw.githubusercontent.com/remotehive-dev/remotehive-releases/main/RemoteHive.apk"
          echo "artifact_url=$PERMANENT_URL" >> $GITHUB_OUTPUT
          # Generate QR code (permanent URL, never needs updating)
          curl -s "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=$PERMANENT_URL" -o assets/qr-download.png
          # Update README badge and link to permanent URL
          sed -i "s|https://[^ ]*.apk|$PERMANENT_URL|g" README.md
          sed -i "s|build #[a-f0-9]*|build #${{ github.run_number }}|g" README.md
          # Commit README + QR changes
          git config user.name "remotehive-bot"
          git config user.email "bot@remotehive.in"
          git add assets/qr-download.png README.md
          git diff --cached --quiet || git commit -m "chore: update APK download QR [skip ci]"
          git push
          # Clone public releases repo and push APK + version.json
          git clone https://x-access-token:${{ secrets.RELEASES_TOKEN }}@github.com/remotehive-dev/remotehive-releases.git /tmp/releases
          VERSION_CODE=$(( ${{ github.run_number }} + 1 ))
          cp RemoteHive.apk /tmp/releases/RemoteHive.apk
          cat > /tmp/releases/version.json <<EOF
          {
            "version": "1.0.${{ github.run_number }}",
            "versionCode": $VERSION_CODE,
            "apkUrl": "$PERMANENT_URL",
            "releaseNotes": "Build #${{ github.run_number }}"
          }
          EOF
          cd /tmp/releases
          git config user.name "remotehive-bot"
          git config user.email "bot@remotehive.in"
          git add RemoteHive.apk version.json
          git diff --cached --quiet || git commit -m "chore: update to build #${{ github.run_number }}"
          git push

      - name: Publish JS update to old APKs via EAS Update
        run: |
          npx eas update --branch preview --environment preview --message "Build #${{ github.run_number }}: ${{ github.event.head_commit.message }}"
