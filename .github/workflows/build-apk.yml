name: Build APK

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  R2_ENDPOINT: ${{ secrets.CLOUDFLARE_R2_ENDPOINT }}
  R2_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY }}
  R2_SECRET_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_KEY }}
  R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
  ANDROID_HOME: C:\Users\dell\AppData\Local\Android\Sdk
  TMP: C:\tmp
  TEMP: C:\tmp
  ANDROID_TEMP: C:\tmp

jobs:
  build:
    runs-on: [self-hosted, Windows, android]
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          persist-credentials: true

      - name: Runner & env diagnostics
        shell: powershell
        run: |
          Write-Host "User:"; whoami
          Write-Host "Node:"; node --version
          try { & java -version 2>&1 } catch {}
          Write-Host "ANDROID_HOME exists:"; Test-Path $env:ANDROID_HOME
          Write-Host "JAVA_HOME:"; $env:JAVA_HOME
          Write-Host "Git remote:"; git remote -v

      - name: Enable long paths for Git
        shell: powershell
        run: git config --global core.longPaths true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Ensure Java 17 is active (override system Java 8)
        shell: powershell
        run: |
          if ($env:JAVA_HOME -and (Test-Path "$env:JAVA_HOME\bin\java.exe")) {
            $javaBin = "$env:JAVA_HOME\bin"
            Write-Host "Prepending $javaBin to PATH"
            echo "$javaBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          } else {
            $jdkDirs = @(
              "C:\Program Files\Eclipse Adoptium",
              "C:\Program Files\Java",
              "C:\Program Files\Microsoft\jdk"
            )
            $found = $false
            foreach ($dir in $jdkDirs) {
              $jdk = Get-ChildItem "$dir\jdk-17*" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($jdk) {
                $javaBin = Join-Path $jdk.FullName "bin"
                Write-Host "Found Java 17 at $($jdk.FullName)"
                echo "JAVA_HOME=$($jdk.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                echo "$javaBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
                $found = $true
                break
              }
            }
            if (-not $found) { throw "Java 17 not found on runner" }
          }
          & "$env:JAVA_HOME\bin\java" -version

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true

      - name: Ensure temp dir
        shell: powershell
        run: New-Item -ItemType Directory -Force -Path C:\tmp | Out-Null

      - name: Accept licenses and install CMake 3.22.1
        shell: powershell
        run: |
          $cmakeDir = Join-Path $env:ANDROID_HOME "cmake\3.22.1"
          if (Test-Path "$cmakeDir\bin\cmake.exe") {
            Write-Host "CMake 3.22.1 already installed, skipping"
            exit 0
          }
          # Write all known license hashes to auto-accept
          $licensesDir = Join-Path $env:ANDROID_HOME "licenses"
          New-Item -ItemType Directory -Force -Path $licensesDir | Out-Null
          @{
            "android-sdk-license" = "24333f8a63b6825ea9c5514f83c2827b002a9bda"
            "android-sdk-preview-license" = "84831b9409646a918e30573bab4c9c91346d8abd"
          }.GetEnumerator() | ForEach-Object {
            Set-Content -Path (Join-Path $licensesDir $_.Key) -Value $_.Value
          }
          # Download CMake 3.22.1 archive directly from Google's SDK repo
          $url = "https://dl.google.com/android/repository/cmake-3.22.1-windows-x86_64.zip"
          $zip = "$env:TMP\cmake-3.22.1.zip"
          Write-Host "Downloading CMake 3.22.1..."
          curl.exe -sL "$url" -o "$zip"
          if (-not (Test-Path $zip)) { throw "CMake download failed" }
          Write-Host "Extracting to $cmakeDir..."
          New-Item -ItemType Directory -Force -Path $cmakeDir | Out-Null
          & tar.exe -xf "$zip" -C "$cmakeDir" --strip-components 1
          Remove-Item $zip -Force
          if (Test-Path "$cmakeDir\bin\cmake.exe") {
            Write-Host "CMake 3.22.1 installed successfully"
          } else { throw "CMake extraction failed" }

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate keystore for signing
        shell: powershell
        run: |
          Remove-Item -Force remotehive-keystore.jks -ErrorAction SilentlyContinue
          keytool -genkey -v -keystore remotehive-keystore.jks -alias remotehive -keyalg RSA -keysize 2048 -validity 10000 -storepass remotehive123 -keypass remotehive123 -dname "CN=RemoteHive, OU=Engineering, O=RemoteHive, L=San Francisco, ST=CA, C=US"

      - name: Prebuild native Android project (clean first)
        run: |
          npx expo prebuild --platform android --clean

      - name: Clean app build and accept cmake cache
        shell: powershell
        run: |
          cd android
          cmd /c "gradlew.bat clean"
          cd ..

      - name: Set CMake 3.31.6 for native builds
        shell: powershell
        run: |
          "cmake.dir=C\:\\Users\\dell\\AppData\\Local\\Android\\Sdk\\cmake\\3.31.6" | Add-Content android/local.properties

      - name: Inject signing config into build.gradle
        shell: powershell
        run: |
          Copy-Item remotehive-keystore.jks android/app/
          node scripts/inject-signing.js android/app/build.gradle

      - name: Build release APK
        shell: powershell
        run: |
          cd android
          cmd /c "gradlew.bat assembleRelease"
          if ($LASTEXITCODE -ne 0) { throw "Gradle build failed" }

      - name: Rename and prepare APK
        shell: powershell
        run: Copy-Item android/app/build/outputs/apk/release/app-release.apk RemoteHive.apk

      - name: Upload APK to Cloudflare R2
        shell: powershell
        run: |
          curl.exe -s -X PUT "$env:R2_ENDPOINT/$env:R2_BUCKET/RemoteHive.apk" --aws-sigv4 "aws:amz:auto:s3" --user "$env:R2_ACCESS_KEY:$env:R2_SECRET_KEY" -T RemoteHive.apk -w "APK upload: HTTP %{http_code}`n"

      - name: Update version.json in R2
        shell: powershell
        run: |
          $VERSION_CODE = $($env:GITHUB_RUN_NUMBER + 1)
          $VERSION_JSON = '{"version":"1.0.${{ github.run_number }}","versionCode":' + $VERSION_CODE + ',"apkUrl":"https://dl.remotehive.in/latest.apk","releaseNotes":"Build #${{ github.run_number }}"}'
          Set-Content -Path $env:TMP\version.json -Value $VERSION_JSON -Encoding ASCII
          curl.exe -s -X PUT "$env:R2_ENDPOINT/$env:R2_BUCKET/version.json" --aws-sigv4 "aws:amz:auto:s3" --user "$env:R2_ACCESS_KEY:$env:R2_SECRET_KEY" -T $env:TMP\version.json -w "version.json upload: HTTP %{http_code}`n"

      - name: Deploy web app to Cloudflare Workers
        continue-on-error: true
        shell: powershell
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          Write-Host "=== Web deployment ==="
          $ErrorActionPreference = 'Continue'
          npx expo export -p web
          if ($LASTEXITCODE -ne 0) { Write-Warning "Expo web export failed (continuing)"; exit 0 }
          npx wrangler deploy --config wrangler.jsonc
          if ($LASTEXITCODE -ne 0) { Write-Warning "Wrangler deploy failed (continuing)"; exit 0 }

      - name: Regenerate QR code and update README
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "=== Diagnostics before README update ==="
          git --version
          git remote -v
          git status --porcelain
          Write-Host "Downloading QR image..."
          curl.exe -s "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://dl.remotehive.in/latest.apk" -o assets/qr-download.png
          if (-not (Test-Path assets/qr-download.png)) {
            Write-Error "QR download failed: assets/qr-download.png not found"
          }
          Write-Host "Updating README build number..."
          $readme = Get-Content README.md -Raw
          $new = $readme -replace 'build #[0-9]*', "build #${{ github.run_number }}"
          if ($new -ne $readme) {
            $new | Set-Content README.md -Encoding UTF8
          } else {
            Write-Host "README already up-to-date."
          }
          git config user.name "remotehive-bot"
          git config user.email "bot@remotehive.in"
          git add assets/qr-download.png README.md
          $changes = (git status --porcelain)
          if ($changes) {
            Write-Host "Committing and pushing changes..."
            git commit -m "chore: update QR + build number [skip ci]"
            git push
          } else {
            Write-Host "No changes to commit."
          }
